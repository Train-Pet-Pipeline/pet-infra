name: cross-repo-smoke-install

on:
  push:
    branches: [dev, main]
    paths:
      - 'docs/compatibility_matrix.yaml'
  workflow_dispatch: {}

jobs:
  smoke-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - pet-data
          - pet-annotation
          - pet-train
          - pet-eval
          - pet-quantize
          - pet-ota
          - pet-id

    steps:
      - name: Checkout pet-infra
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Parse compatibility_matrix.yaml and emit env vars
        id: parse_matrix
        run: |
          python - >> "$GITHUB_ENV" << 'PYEOF'
          import yaml
          with open("docs/compatibility_matrix.yaml") as f:
              data = yaml.safe_load(f)
          latest = data["releases"][-1]
          for key in (
              "pet_schema", "pet_infra",
              "pet_data", "pet_annotation", "pet_train",
              "pet_eval", "pet_quantize", "pet_ota", "pet_id",
          ):
              if key in latest:
                  print(f"{key.upper()}={latest[key]}")
          release_name = latest.get("release", "unknown")
          print(f"MATRIX_RELEASE={release_name}")
          PYEOF

      - name: Show matrix release being tested
        run: |
          echo "Matrix release = $MATRIX_RELEASE"

      # pet-id is a standalone tool with no pet-* peer deps — skip peer installs
      - name: Install pet-schema peer dependency
        if: matrix.repo != 'pet-id'
        run: |
          pip install "pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v${PET_SCHEMA}"

      - name: Install pet-infra peer dependency
        if: matrix.repo != 'pet-id'
        run: |
          pip install "pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v${PET_INFRA}"

      - name: Install target repo at matrix-pinned version (--no-deps)
        run: |
          REPO_KEY=$(echo "${{ matrix.repo }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          VER=$(printenv "${REPO_KEY}")
          if [ -z "${VER}" ]; then
            echo "ERROR: no matrix entry for repo=${{ matrix.repo }} key=${REPO_KEY} release=${MATRIX_RELEASE}"
            exit 1
          fi
          echo "Installing ${{ matrix.repo }} at v${VER} --no-deps"
          pip install "${{ matrix.repo }} @ git+https://github.com/Train-Pet-Pipeline/${{ matrix.repo }}@v${VER}" --no-deps

      - name: Resolve third-party deps for target repo (second pass)
        run: |
          REPO_KEY=$(echo "${{ matrix.repo }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          VER=$(printenv "${REPO_KEY}")
          echo "Resolving third-party extras for ${{ matrix.repo }} at v${VER}"
          pip install "${{ matrix.repo }} @ git+https://github.com/Train-Pet-Pipeline/${{ matrix.repo }}@v${VER}"

      - name: Assert installed version matches matrix pin
        run: |
          REPO_KEY=$(echo "${{ matrix.repo }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          VER=$(printenv "${REPO_KEY}")
          PKG_MODULE=$(echo "${{ matrix.repo }}" | tr '-' '_')
          python - << PYEOF
          import importlib, sys
          mod = importlib.import_module("${PKG_MODULE}")
          installed = getattr(mod, "__version__", None)
          expected = "${VER}"
          if installed != expected:
              print(f"FAIL: {mod.__name__}.__version__={installed!r} but matrix pin is {expected!r}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {mod.__name__}.__version__={installed!r} matches matrix release ${MATRIX_RELEASE}")
          PYEOF

      - name: Cross-ecosystem peer import check
        if: matrix.repo != 'pet-id'
        run: |
          python - << 'PYEOF'
          import pet_schema, pet_infra
          print(f"peer imports ok: pet_schema={pet_schema.__version__}, pet_infra={pet_infra.__version__}")
          PYEOF
