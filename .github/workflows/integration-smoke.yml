name: integration-smoke
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
jobs:
  smoke-tiny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1
      - name: Install pet-infra + pet-train (matrix 2026.07-rc pins)
        run: |
          pip install -e ".[dev]"
          pip install 'pet-train @ git+https://github.com/Train-Pet-Pipeline/pet-train@v2.0.0-rc1'
      - name: Compose smoke_tiny (validates recipe structure + plugin resolution)
        run: |
          python -c "
          from pet_infra.recipe.compose import compose_recipe
          r, d, sha = compose_recipe('recipes/smoke_tiny.yaml')
          print(r.recipe_id, sha[:8])
          print('smoke_tiny composed OK')
          "
