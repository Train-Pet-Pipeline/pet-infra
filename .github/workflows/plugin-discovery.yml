name: plugin-discovery
on:
  pull_request: { branches: [dev, main] }
  push:         { branches: [dev, main] }
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Install pet-schema peer dependency
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v3.0.0'

      - name: Install pet-infra (editable, this PR's code)
        run: pip install -e ".[dev]"

      - name: Install Phase 2 downstream plugin packages (peer-dep, no-deps)
        run: |
          pip install 'pet-data @ git+https://github.com/Train-Pet-Pipeline/pet-data@v1.2.0' --no-deps
          pip install 'pet-annotation @ git+https://github.com/Train-Pet-Pipeline/pet-annotation@v2.0.0' --no-deps

      - name: Assert pet-infra peer version (§11.4)
        run: python -c "import pet_infra; assert pet_infra.__version__.startswith('2.'), pet_infra.__version__"

      - name: pet list-plugins
        run: |
          pet list-plugins --json > plugins.json
          cat plugins.json
          python -c "import json; d=json.load(open('plugins.json')); assert 'local' in d['storage'], d"

      - name: Assert Phase 2 dataset plugins registered (4-paradigm)
        run: |
          jq -e '.datasets | index("pet_data.vision_frames")'     plugins.json
          jq -e '.datasets | index("pet_data.audio_clips")'       plugins.json
          jq -e '.datasets | index("pet_annotation.llm")'         plugins.json
          jq -e '.datasets | index("pet_annotation.classifier")'  plugins.json
          jq -e '.datasets | index("pet_annotation.rule")'        plugins.json
          jq -e '.datasets | index("pet_annotation.human")'       plugins.json
          jq -e '.evaluators | index("pet_infra.noop_evaluator")' plugins.json
