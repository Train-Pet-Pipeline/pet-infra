services:
  dev:
    build:
      context: docker/dev
    volumes:
      - ..:/workspace
      - pet-data:/data
    working_dir: /workspace
    stdin_open: true
    tty: true

  labelstudio:
    extends:
      file: docker/labelstudio/docker-compose.yml
      service: labelstudio
    depends_on:
      labelstudio-db:
        condition: service_healthy

  labelstudio-db:
    extends:
      file: docker/labelstudio/docker-compose.yml
      service: labelstudio-db

  wandb:
    extends:
      file: docker/wandb/docker-compose.yml
      service: wandb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pet-data:
  labelstudio-data:
  labelstudio-pg:
  wandb-data:
