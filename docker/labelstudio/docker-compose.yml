services:
  labelstudio:
    image: heartexlabs/label-studio:latest
    ports:
      - "8080:8080"
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=labelstudio
      - POSTGRE_USER=labelstudio
      - POSTGRE_PASSWORD=labelstudio
      - POSTGRE_HOST=labelstudio-db
      - POSTGRE_PORT=5432
    volumes:
      - labelstudio-data:/label-studio/data
    depends_on:
      - labelstudio-db

  labelstudio-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=labelstudio
      - POSTGRES_USER=labelstudio
      - POSTGRES_PASSWORD=labelstudio
    volumes:
      - labelstudio-pg:/var/lib/postgresql/data

volumes:
  labelstudio-data:
  labelstudio-pg:
