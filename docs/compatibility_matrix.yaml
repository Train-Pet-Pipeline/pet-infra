  - release: "2026.10-ecosystem-cleanup"
    released: 2026-04-23
    phase: ecosystem-optimization
    pet_schema: "3.2.1"          # v3.x additive: SFTSample + ShareGPTSFTSample + DPOSample
    pet_infra: "2.6.0"           # compose merge + StageRunner DRY + cross-repo smoke CI + OVERVIEW.md
    pet_data: "1.3.0"            # Phase 3: ingester_name vs default_provenance split + Alembic 004
    pet_annotation: "2.1.1"      # Phase 5: exporter rewrite α + producer-side JSONL validator
    pet_train: "2.0.2"           # Phase 5: β dual guard + W&B residue guard + JSONL consumer validator
    pet_eval: "2.3.0"            # Phase 6: dead gate/report/constrained cleanup (~418 LOC)
    pet_quantize: "2.1.0"        # Phase 7 7A: pet-infra hardpin → β peer-dep (spec §5.1 #1)
    pet_ota: "2.2.0"             # Phase 8 8A+8B: pet-infra peer-dep + pet-quantize unpin (§5.1 #1/#2)
    pet_id: "0.2.0"              # Phase 9: independent CLI — first CI onboarding + docs (spec §5.2)
    pet_demo: "1.0.1"            # unchanged (owned by another agent; out of ecosystem optimization scope)
    clearml: ">=1.14,<2.0"
    mmengine_lite: ">=0.10,<0.12"
    hydra_core: ">=1.3,<1.4"
    rknn_toolkit2: "==2.0.0"     # carry forward (no hardware change — Phase 5 deferred)
    rkllm_toolkit: "==1.2.0"
    notes: |
      Ecosystem optimization closeout. Per-repo CTO walkthrough (8 + pet-id)
      shipped `docs/architecture.md` (9-chapter template per spec §4.1);
      `pet-infra/docs/architecture/OVERVIEW.md` is the monorepo index.

      Dependency governance unified (spec §5.1):
        #1 pet-infra hardpin → β peer-dep in pet-quantize (v2.1.0) + pet-ota
           (v2.2.0); both adopted the delayed-guard option-X pattern inside
           `register_all()` for DEV_GUIDE §11.3 consistency.
        #2 pet-ota `[signing]` extra `pet-quantize>=1.0.0` → no-pin.
           pet-eval already on this cross-repo plugin pattern; now consistent
           across 9 repos.

      CI guards:
        - `no-wandb-residue.yml` now live on pet-eval / pet-train / pet-quantize
          / pet-ota / pet-id (positive-list scan; ClearML is sole tracker).
        - pet-id gained its first-ever `.github/workflows/` (ci.yml +
          no-wandb-residue.yml).
        - pet-infra `cross-repo-smoke-install.yml` verifies the matrix row's
          install order matches the published OVERVIEW §4 table.

      No-hardcode sweep picked up the last standing violations:
        - pet-eval `audio_evaluator.sample_rate` now reads from params.yaml.
        - pet-ota `release/check_gate.py` `dpo_pairs < 500` / `days < 7`
          moved to `params.release.min_dpo_pairs` + `min_days_since_last_release`.

      Hardware paths unchanged (Phase 5 deferred pending rk3576 runner procurement).

  - release: "2026.11-eco-validation-fixes"
    pet_schema: "3.3.0"
    pet_infra: "2.7.0"
    pet_data: "1.3.0"
    pet_annotation: "2.2.0"
    pet_train: "2.1.0"
    pet_eval: "2.4.0"
    pet_quantize: "2.1.0"
    pet_ota: "2.2.0"
    pet_id: "0.2.0"
    clearml: ">=1.14,<2.0"
    mmengine_lite: ">=0.10,<0.12"
    hydra_core: ">=1.3,<1.4"
    rknn_toolkit2: "==2.0.0"
    rkllm_toolkit: "==1.2.0"
    notes: |
      Ecosystem-validation 2026-04-25 rental session closeout (~3.5h on
      AutoDL RTX PRO 6000 Blackwell 96GB).

      Phase 1 critical-path E2E shipped end-to-end:
        - 30 image ingest → Doubao label (60 LLM annotations + 30 DPO pairs)
        - Qwen2-VL-2B SFT loss 0.42→0.17 in 26s (LoRA r=16)
        - Qwen2-VL-2B full-param SFT loss 0.17→0.05 in 59s
        - DPO LoRA training rewards/margins 0.13→0.34 in 64s
        - LocalBackendPlugin OTA manifest deployed.

      Phase 2 capability matrix 38/45 items + Phase 3 cross-cutting 8/8.
      North-Star 4-dim ≥ 3 satisfied (P/F/E/C = 4/4/4/3).

      14 findings catalogued (F001-F014), 12 fixed and shipped:
        - F001 (STRUCTURAL): pet-schema v3.3.0 restored ShareGPTSFTSample.images
          (regression introduced v3.2.0 silently broke Phase 3A VLM contract)
        - F004 (HIGH): pet-annotation Literal accepts doubao + DoubaoProvider routed
        - F005 (HIGH): pet-annotation parses storage_uri RFC 3986 scheme
        - F009 (HIGH): pet-infra cli auto-discovers plugins before pet_run
        - F010 (MEDIUM): pet-train Makefile auto-inits LLaMA-Factory submodule
        - F011 (HIGH): pet-train llamafactory wrappers use run_exp(args=dict)
        - F012 (HIGH): pet-infra pet_run persists ModelCard to ./model_cards/
        - F013 (HIGH): pet-train wrapper honors finetuning_type cfg
        - F014 (STRUCTURAL): pet-eval fusion plugins have orchestrator-compatible run()
        - F002/F003/F006: bootstrap_rental.sh fixes (rental env compat)

      Deferred:
        - F007 rsync slow on AutoDL int'l bandwidth (use hf-mirror.com)
        - F008 PANNs MobileNetV2 architecture mismatch (Phase 5 audio rewrite)

      No hardware path changes. Phase 5 RK3576 deferred.
