# pet-infra configuration
logging:
  default_level: "INFO"

retry:
  max_attempts: 3
  wait_min: 2
  wait_max: 30
  multiplier: 1

api_client:
  default_concurrency: 10
  default_timeout: 60

store:
  pragma_journal_mode: "wal"
  pragma_foreign_keys: true

eval:
  batch_size: 8
  max_samples: 500

gate:
  min_anomaly_recall: 0.80
  max_calibration_ece: 0.10
  max_kl_quantization: 0.05
  max_latency_ms_p95: 2000
  min_mood_correlation: 0.60
  min_narrative_quality: 3.0
  min_schema_compliance: 0.95
  min_audio_accuracy: 0.60

smoke:
  min_anomaly_recall: 0.0
  max_calibration_ece: 1.0
  max_kl_quantization: 1.0
  max_latency_ms_p95: 999999
  min_mood_correlation: 0.0
  min_narrative_quality: 0.0
  min_schema_compliance: 0.0
  min_audio_accuracy: 0.0

quantize:
  calibration:
    num_samples: 64
    batch_size: 8
  rkllm:
    target_platform: rk3576
    quantized_dtype: w4a16
  rknn:
    target_platform: rk3576
    optimization_level: 3

ota:
  local_backend:
    storage_root: ./ota_artifacts

# Phase 3B gate thresholds for post-quantization hardware evaluation.
# These extend the existing gate: block above with quantize-specific keys.
gate_quantize:
  max_latency_ms_p95: 500
  min_quantized_accuracy: 0.85
  max_kl_divergence: 0.1
