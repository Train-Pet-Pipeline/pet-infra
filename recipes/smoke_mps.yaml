recipe:
  recipe_id: smoke_mps
  description: "Phase 3A local dev — Qwen2-VL LoRA on MPS + VLM eval, M2+ Mac"
  scope: single_repo
  owner_repo: pet-infra
  schema_version: "2.0.0"
  stages:
    - name: train
      component_registry: trainers
      component_type: llamafactory_sft
      inputs: {}
      config_path: configs/smoke/mps_train.yaml
      depends_on: []
    - name: eval
      component_registry: evaluators
      component_type: vlm_evaluator
      inputs:
        model: {ref_type: recipe_stage_output, ref_value: train}
      config_path: configs/smoke/mps_eval.yaml
      depends_on:
        - train
  variations: []
  produces:
    - smoke_mps_model
  default_storage: local
  required_plugins:
    - pet_train
    - pet_eval

experiment_logger:
  name: clearml
  mode: offline
  on_unavailable: fallback_null
