recipe:
  recipe_id: smoke_tiny
  description: "Phase 3A PR gate — tiny_test trainer, CPU-only, <2 min"
  scope: single_repo
  owner_repo: pet-infra
  schema_version: "2.0.0"
  stages:
    - name: train
      component_registry: trainers
      component_type: tiny_test
      inputs: {}
      config_path: configs/smoke/tiny_train.yaml
      depends_on: []
  variations: []
  produces:
    - smoke_tiny_model
  default_storage: local
  required_plugins:
    - pet_train

experiment_logger:
  name: clearml
  mode: offline
  on_unavailable: fallback_null
