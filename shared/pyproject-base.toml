# Shared ruff/mypy configuration for all pet-pipeline repos.
# Synced via `make sync-infra` — do not edit in downstream repos.
# Repos may add custom rules in [tool.ruff.lint.per-file-ignores]
# or [tool.ruff.lint.extend-select] — sync will not touch those sections.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
