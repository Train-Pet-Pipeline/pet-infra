recipe_id: with-variations-test
description: Two-axis cartesian fixture (lr x batch_size, 2x2 = 4 variations)
scope: single_repo
schema_version: "2.0.0"
stages:
  - name: sft
    component_registry: trainers
    component_type: sft_lora
    inputs: {}
    config_path: configs/sft.yaml
    depends_on: []
  - name: eval
    component_registry: evaluators
    component_type: noop_eval
    inputs: {}
    config_path: configs/eval.yaml
    depends_on: [sft]
variations:
  - name: lr
    stage: sft
    hydra_path: trainer.lr
    values: [0.0001, 0.001]
  - name: batch_size
    stage: sft
    hydra_path: trainer.batch_size
    values: [4, 8]
produces:
  - sft_model
default_storage: local
required_plugins: []
